name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check all Python syntax
      run: |
        python -m compileall . -q
        echo "All Python files pass syntax check"

    - name: Install pyflakes
      run: pip install pyflakes

    - name: Check with pyflakes
      run: python -m pyflakes app/

    - name: Check imports load
      run: python -c "
from app.config import ISO_STANDARDS, OUTPUT_DOCUMENTS
from app.services.ai import create_provider
from app.services.ai.model_registry import FRONTIER_NAMES, STRONG_NAMES, GROQ_NAMES
from app.services.ai.debugger import Autodebugger, REQUIRED_FIELDS
print(f'OK: {len(ISO_STANDARDS)} standards, {len(OUTPUT_DOCUMENTS)} docs, router tiers: frontier={len(FRONTIER_NAMES)}, strong={len(STRONG_NAMES)}, groq={len(GROQ_NAMES)}')
for name in ['nemotron_ultra', 'kimi_k26', 'llama_70b', 'groq_llama']:
    p = create_provider(name)
    print(f'  Provider {name}: {type(p).__name__}')
for t in REQUIRED_FIELDS:
    print(f'  Debugger schema: {t} ({len(REQUIRED_FIELDS[t])} fields)')
"

    - name: Run tests
      run: python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
